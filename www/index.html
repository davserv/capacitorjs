    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const chatContainer = document.getElementById('chatContainer');
            const chatForm = document.getElementById('chatForm');
            const userQuery = document.getElementById('userQuery');
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // Foco automático no input (com ajuste para mobile)
            if (!isMobile) {
                userQuery.focus();
            }

            // Mensagem inicial
            setTimeout(() => {
                addMessage('🤖 Olá! Sou seu assistente virtual. Como posso te ajudar hoje?', 'agent');
            }, 500);

            // Submit do formulário
            chatForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const query = userQuery.value.trim();

                if (query) {
                    addMessage(query, 'user');
                    userQuery.value = '';

                    if (isMobile) {
                        userQuery.blur();
                    }

                    const typingId = showTypingIndicator();

                    setTimeout(() => {
                        removeTypingIndicator(typingId);
                        addMessage('🤖 Vou redirecioná-lo para o melhor modelo de ia e sua pergunta vai obter a melhor resposta!', 'agent');

                        setTimeout(() => {
                            const redirectId = showTypingIndicator();
                            setTimeout(() => {
                                removeTypingIndicator(redirectId);

            // Função para adicionar mensagem
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message d-flex ${sender === 'user' ? 'justify-content-end ms-auto' : 'justify-start me-auto'}`;

                const bubble = document.createElement('div');
                bubble.className = `chat-bubble px-4 py-2 mt-3 ${sender === 'user' ? 'bubble-user' : 'bubble-agent'}`;
                bubble.innerHTML = text;

                messageDiv.appendChild(bubble);
                chatContainer.appendChild(messageDiv);

                scrollToBottom();

                setTimeout(() => {
                    messageDiv.classList.add('visible');
                    scrollToBottom();
                }, 50);
            }

            // Indicador de digitação
            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message d-flex justify-start me-auto';
                typingDiv.id = 'typing-' + Date.now();

                const bubble = document.createElement('div');
                bubble.className = 'bubble-agent px-4 py-2';
                /*bubble.className = 'bubble-agent px-4 py-2';*/

                const dots = document.createElement('div');
                dots.className = 'typing-indicator';
                dots.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

                bubble.appendChild(dots);
                typingDiv.appendChild(bubble);
                chatContainer.appendChild(typingDiv);

                scrollToBottom();

                setTimeout(() => {
                    typingDiv.classList.add('visible');
                }, 50);

                return typingDiv.id;
            }

            function removeTypingIndicator(id) {
                const typingElement = document.getElementById(id);
                if (typingElement) {
                    typingElement.remove();
                }
            }

            // Scroll suave para o final do chat
            function scrollToBottom() {
                chatContainer.scrollTo({
                    top: chatContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }

            // Ajuste de altura ao redimensionar
            window.addEventListener('resize', function () {
                scrollToBottom();
            });
        });
        /*shared*/
        function sharesbutton() {
            navigator.share({
                title: document.title,
                text: "COMPARTILHAR " + document.title + " \n",
                url: window.location.href
            });
        }

        var creditsyear = new Date();
        document.getElementById("datacedencer").innerHTML = creditsyear.getFullYear();
    </script>
